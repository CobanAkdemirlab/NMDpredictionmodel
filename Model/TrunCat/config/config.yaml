# Configuration for TrunCat (TRUNcation-aware Classifier using Annotated Transcripts)
# Full-model training and evaluation workflow (formerly: spooky_model / CatBoost)
# ----------------------------------------------------------------------------
# SETUP INSTRUCTIONS
# Place your input data files in the locations specified under data: below,
# or edit the paths to match your local directory layout.
#
# Expected project structure (relative to Model/TrunCat/):
#
#   NMDpredictionmodel/
#   └── Model/
#       └── TrunCat/
#           ├── config/
#           │   └── config.yaml          <- this file
#           ├── notebooks/
#           │   ├── 01_data_loading_and_merging.ipynb
#           │   ├── 02_feature_cleaning_and_selection.ipynb
#           │   └── 03_model_training.ipynb
#           ├── data/
#           │   ├── README.md
#           │   ├── TOPMed_stopgain.csv  <- TOPMed stopgain variants (not distributed)
#           │   └── annotations/
#           │       ├── codon_optimality.tsv
#           │       ├── readthrough.csv
#           │       ├── ejc_occupancy.tsv
#           │       ├── ptc_aug.tsv
#           │       └── conservation_medians.csv
#           ├── results/                 <- created automatically on first run
#           └── scripts/
#
# NOTE: All paths are relative to the repo root. The notebooks resolve them
# using BASE_DIR = Path(config_path).parent.parent so they work regardless
# of which directory the Jupyter kernel is launched from.
# ----------------------------------------------------------------------------

# ==============================================================================
# DATA PATHS
# ==============================================================================
data:
  # Notebook 01 - Data Loading and Merging
  # Input files — place these in data/ (see data/README.md for sourcing)
  enhanced_features: "data/TOPMed_stopgain.csv"
  codon_optimality:  "data/annotations/codon_optimality.tsv"
  readthrough:       "data/annotations/readthrough.csv"
  ejc:               "data/annotations/ejc_occupancy.tsv"
  ptc_aug:           "data/annotations/ptc_aug.tsv"
  conservation:      "data/annotations/conservation_medians.csv"

  # Notebook 01 output / Notebook 02 input
  merged:            "data/TOPMed_merged.csv"

  # Notebook 02 output / Notebook 03 input
  cleaned:           "data/TOPMed_cleaned.csv"
  feature_list:      "data/final_feature_list.csv"

# ==============================================================================
# MODEL CONFIGURATION
# ==============================================================================
model:
  # Target variable
  target: "NMD.ESCAPEE"

  # Random seed for reproducibility
  random_seed: 42

  # Cross-validation
  n_folds: 5

  # CatBoost hyperparameters (Optuna-optimized)
  catboost:
    iterations: 1294
    learning_rate: 0.03072886163898516
    depth: 8
    l2_leaf_reg: 6.426732194425712
    bagging_temperature: 0.9091316663819741
    random_strength: 0.13533272382130845
    border_count: 155
    min_data_in_leaf: 29
    verbose: False
    early_stopping_rounds: 50

# ==============================================================================
# OUTPUT PATHS
# ==============================================================================
output:
  # Model outputs (Notebook 03)
  models_dir: "model"
  final_model_cbm: "model/truncat.cbm"
  final_model_pkl: "model/truncat.pkl"
  cv_models_dir: "results/models/cv_folds"

  # Results (Notebook 03)
  results_dir: "results"
  cv_predictions: "results/cv_predictions.csv"
  cv_metrics: "results/cv_metrics.csv"
  feature_importance: "results/feature_importance_cv_averaged.csv"

  # Figures (Notebook 03)
  figures_dir: "results/figures"
  roc_curve: "results/figures/roc_curve.png"
  pr_curve: "results/figures/precision_recall_curve.png"
  confusion_matrix: "results/figures/confusion_matrix.png"
  feature_importance_plot: "results/figures/feature_importance_top20.png"
  calibration_curve: "results/figures/calibration_curve.png"

# ==============================================================================
# FEATURE ENGINEERING
# ==============================================================================
features:
  # Categorical features (passed to CatBoost cat_features argument)
  categorical:
    - "pLI.cat"
    - "Freq.cat"
    - "last.EJC"
    - "loefu_cat"
    - "PTC.minus1.aa"
    - "PTC.minus2.aa"
    - "PTC.plus1.aa"
    - "PTC.plus2.aa"
    - "aug_distance_category"
    - "kozak_strength"
    - "has_plus1_aug"
    - "has_plus2_aug"
    - "aug_frame_status"
    - "has_ejc_overlap"
    - "readthrough_category_hek293t"

  # RBP feature prefixes — protected from correlation-based removal
  rbp_prefixes:
    - "utr3_all"
    - "newutr_all"
    - "utr3_200"
    - "newutr_200"
    - "ptc_pm100"
    - "ejc_pm100"
    - "ptc_to_ejc"

  # Pearson correlation threshold for redundant feature removal
  correlation_threshold: 0.95

# ==============================================================================
# VISUALIZATION
# ==============================================================================
visualization:
  # Figure settings
  figure_dpi: 300
  figure_format: "png"

  # Style
  style: "seaborn-v0_8-whitegrid"
  palette: "Set2"

  # Feature importance
  top_n_features: 20
