# Configuration for NMD Escape Prediction Model
# Edit paths below to match your local setup

# ==============================================================================
# DATA PATHS
# ==============================================================================
data:
  # Notebook 01 - Data Loading and Merging
  enhanced_features: "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/TOPMed_stopgain_Mar_6_26.csv"
  codon_optimality:  "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/annotations/codon_optimality_v4.tsv"
  readthrough:       "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/annotations/readthrough_v4.csv"
  ejc:               "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/annotations/ejc_occupancy_v4.tsv"
  ptc_aug:           "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/annotations/ptc_aug_v4.tsv"
  conservation:      "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/annotations/variants_with_conservation_medians.csv"

  # Notebook 01 output / Notebook 02 input
  merged:            "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/TOPMed_merged_v4.csv"

  # Notebook 02 output / Notebook 03 input
  cleaned:           "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/TOPMed_cleaned_v4.csv"
  feature_list:      "/Users/jschmidt3/Iman_visualizations/spooky_model_v4/final_feature_list.csv"

# ==============================================================================
# MODEL CONFIGURATION
# ==============================================================================
model:
  # Target variable
  target: "NMD.ESCAPEE"
  
  # Random seed for reproducibility
  random_seed: 42
  
  # Cross-validation
  n_folds: 5
  
  # CatBoost hyperparameters (optimized)
  catboost:
    iterations: 1000
    learning_rate: 0.03
    depth: 6
    l2_leaf_reg: 3
    border_count: 128
    bagging_temperature: 1
    random_strength: 1
    verbose: False
    early_stopping_rounds: 50

# ==============================================================================
# OUTPUT PATHS
# ==============================================================================
output:
  # Base directory for all outputs
  base_dir: "results"
  
  # Model outputs (Notebook 03)
  models_dir: "models"
  final_model_cbm: "models/catboost_final_model.cbm"
  final_model_pkl: "models/catboost_final_model.pkl"
  cv_models_dir: "models/cv_folds"
  
  # Results (Notebook 03)
  results_dir: "results"
  cv_predictions: "results/cv_predictions.csv"
  cv_metrics: "results/cv_metrics.csv"
  feature_importance: "results/feature_importance_cv_averaged.csv"
  
  # Figures (Notebook 03)
  figures_dir: "results/figures"
  roc_curve: "results/figures/roc_curve.png"
  pr_curve: "results/figures/precision_recall_curve.png"
  confusion_matrix: "results/figures/confusion_matrix.png"
  feature_importance_plot: "results/figures/feature_importance_top20.png"
  calibration_curve: "results/figures/calibration_curve.png"

# ==============================================================================
# FEATURE ENGINEERING
# ==============================================================================
features:
  # Categorical features (for CatBoost)
  categorical:
    - "pLI.cat"
    - "Freq.cat"
    - "last.EJC"
    - "loefu_cat"
    - "PTC.minus1.aa"
    - "PTC.minus2.aa"
    - "PTC.plus1.aa"
    - "PTC.plus2.aa"
    - "aug_distance_category"
    - "kozak_strength"
    - "has_plus1_aug"
    - "has_plus2_aug"
    - "aug_frame_status"
    - "has_ejc_overlap"
    - "readthrough_category_hek293t"
  
  # RBP feature prefixes (protected from correlation removal)
  rbp_prefixes:
    - "utr3_all"
    - "utr3_200"
    - "newutr_200"
    - "ptc_pm100"
    - "ejc_pm100"
    - "ptc_to_ejc"
  
  # Correlation threshold for feature removal
  correlation_threshold: 0.95

# ==============================================================================
# VISUALIZATION
# ==============================================================================
visualization:
  # Figure settings
  figure_dpi: 300
  figure_format: "png"
  
  # Style
  style: "seaborn-v0_8-whitegrid"
  palette: "Set2"
  
  # Feature importance
  top_n_features: 20
